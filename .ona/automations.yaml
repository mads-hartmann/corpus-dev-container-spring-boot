tasks:
  installDeps:
    name: Install dependencies
    description: Resolve Maven dependencies so they are cached offline.
    command: |
      ./mvnw -B dependency:go-offline
    triggeredBy:
      - manual
      - postDevcontainerStart
      - prebuild

  build:
    name: Build
    description: Compile and package the Spring Boot application.
    command: |
      ./mvnw -B clean package -DskipTests
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

services:
  spring-boot-app:
    name: Spring Boot App
    description: Run the Spring Boot application with the embedded server.
    triggeredBy:
      - manual
      - postEnvironmentStart
    commands:
      start: |
        ona environment port open 8080 --dont-wait --admission creator_only --name "Spring Boot App"
        ./mvnw -B spring-boot:run -Dspring-boot.run.arguments=--server.address=0.0.0.0
      ready: |
        curl -s -o /dev/null http://localhost:8080
