tasks:
  installDeps:
    name: Install dependencies
    description: Resolve and download Maven dependencies for offline use.
    command: |
      ./mvnw -B dependency:go-offline
    triggeredBy:
      - manual
      - postDevcontainerStart
      - prebuild

  build:
    name: Build
    description: Compile and package the Spring Boot application.
    command: |
      ./mvnw -B clean package -DskipTests
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  test:
    name: Test
    description: Run the test suite.
    command: |
      ./mvnw -B test
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

services:
  spring-boot:
    name: Spring Boot
    description: Run the Spring Boot application.
    commands:
      start: |
        ona environment port open 8080 --admission creator_only --name spring-boot
        ./mvnw -B spring-boot:run
      ready: |
        curl -s -o /dev/null http://localhost:8080
