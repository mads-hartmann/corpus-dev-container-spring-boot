tasks:
  installDeps:
    name: Install dependencies
    description: Resolve Maven dependencies for offline use.
    command: |
      ./mvnw -B dependency:go-offline
    triggeredBy:
      - manual
      - postDevcontainerStart
      - prebuild

  build:
    name: Build
    description: Compile and package the application.
    command: |
      ./mvnw -B package -DskipTests
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

  test:
    name: Test
    description: Run the test suite.
    command: |
      ./mvnw -B test
    triggeredBy:
      - manual
    dependsOn:
      - installDeps

services:
  app:
    name: Spring Boot App
    description: Run the Spring Boot application.
    triggeredBy:
      - manual
      - postEnvironmentStart
    commands:
      start: |
        ona environment port open 8080 --dont-wait --admission creator_only --name "Spring Boot App"
        ./mvnw -B spring-boot:run
      ready: |
        curl -s -o /dev/null http://localhost:8080/
